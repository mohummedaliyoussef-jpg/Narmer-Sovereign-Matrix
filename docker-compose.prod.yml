version: '3.9'
services:
  backend:
    build: ./backend
    deploy:
      replicas: 3
    environment:
      NARMER_JWT_SECRET: ${NARMER_JWT_SECRET}
    ports:
      - "8000"
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: narmer
      POSTGRES_PASSWORD: narmer123
      POSTGRES_DB: narmer_db
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: