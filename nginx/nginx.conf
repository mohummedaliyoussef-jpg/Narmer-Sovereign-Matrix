events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend_server {
        server web:8000;
    }

    upstream frontend_dashboard {
        server frontend:8501;
    }

    # تحويل من HTTP إلى HTTPS تلقائياً
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # البوابة السيادية المشفرة المركزية
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # 1. التوجيه الرئيسي للواجهة الأمامية (Streamlit Dashboard)
        location / {
            proxy_pass http://frontend_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # إعدادات الـ HTTP والتخزين المؤقت للواجهة
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_cache_bypass $http_upgrade;
        }

        # 🚀 الضربة القاضية: تمرير نفق الـ WebSockets الخاص بـ Streamlit (العقدة الأساسية)
        location /stream {
            proxy_pass http://frontend_dashboard/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; # الحفاظ على الجلسة حية بدون انقطاع
        }

        # 2. تمرير كاش ومستندات الـ API (FastAPI Docs & OpenAPI)
        location ~ ^/(docs|openapi.json) {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. الديناميكية الكاملة لتمرير كافة راوترات الباك-إند (auth, admin, network, whatif, assess, etc.)
        location ~ ^/(auth|admin|analyst|viewer|uaepass|assess|network|recommendations|whatif) {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
